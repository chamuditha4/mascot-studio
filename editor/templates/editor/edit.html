<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mascot Studio — Editor</title>
<style>
  :root {
    --bg: #1a1a2e; --surface: #16213e; --accent: #e94560;
    --text: #eee; --text2: #999; --border: rgba(255,255,255,.08);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text);
         height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Top bar ── */
  .topbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    background: var(--surface); border-bottom: 1px solid var(--border); }
  .topbar h1 { font-size: 16px; }
  .topbar .badge { font-size: 12px; color: var(--text2); margin-left: 4px; }
  .spacer { flex: 1; }
  .topbar button { padding: 8px 16px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: .15s; }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: rgba(255,255,255,.05); color: var(--text); }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover { filter: brightness(1.1); }
  .btn-accent:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Main layout ── */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* ── Canvas area ── */
  .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center;
    position: relative; background: repeating-conic-gradient(#2a2a3e 0% 25%, #222236 0% 50%) 50% / 20px 20px;
    overflow: auto; }
  canvas { cursor: crosshair; image-rendering: auto; flex-shrink: 0; }

  /* ── Toolbar ── */
  .tools { position: absolute; top: 12px; left: 12px; display: flex; flex-direction: column;
    gap: 6px; background: var(--surface); border-radius: 10px; padding: 8px;
    border: 1px solid var(--border); }
  .tools button { width: 36px; height: 36px; border: none; border-radius: 8px;
    background: transparent; color: var(--text2); font-size: 16px; cursor: pointer;
    transition: .15s; display: flex; align-items: center; justify-content: center; }
  .tools button:hover { background: rgba(255,255,255,.08); color: var(--text); }
  .tools button.active { background: var(--accent); color: #fff; }
  .tools .size-label { font-size: 10px; color: var(--text2); text-align: center; margin-top: 2px; }
  .tools input[type="range"] { writing-mode: vertical-lr; direction: rtl; height: 80px;
    accent-color: var(--accent); }

  /* ── Filmstrip sidebar ── */
  .filmstrip { width: 180px; background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
  .filmstrip .thumb { width: 100%; aspect-ratio: auto; border-radius: 6px; cursor: pointer;
    border: 2px solid transparent; transition: .15s; opacity: .6; }
  .filmstrip .thumb:hover { opacity: .85; border-color: rgba(255,255,255,.2); }
  .filmstrip .thumb.active { opacity: 1; border-color: var(--accent); }
  .filmstrip .thumb.edited::after { content: '✏️'; position: absolute; font-size: 10px; }

  /* ── Bottom bar ── */
  .bottombar { display: flex; align-items: center; gap: 10px; padding: 8px 16px;
    background: var(--surface); border-top: 1px solid var(--border); font-size: 12px; }
  .bottombar .frame-info { color: var(--text2); }
  .undo-redo { display: flex; gap: 4px; }
  .undo-redo button { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text2); cursor: pointer; font-size: 12px; }
  .undo-redo button:disabled { opacity: .3; cursor: not-allowed; }
  .undo-redo button:hover:not(:disabled) { background: rgba(255,255,255,.05); color: var(--text); }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: #333; color: #fff; padding: 10px 24px; border-radius: 8px;
    font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }

  /* ── Export modal ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; padding: 32px;
    max-width: 400px; width: 90%; text-align: center; }
  .modal h2 { margin-bottom: 12px; }
  .modal p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
  .modal .result { font-size: 13px; color: var(--text2); word-break: break-all; }
  .modal a { color: var(--accent); }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <h1>🎬 Mascot Studio <span class="badge">Editor</span></h1>
  <span class="badge" id="sessionBadge">{{ session_id }}</span>
  <span class="spacer"></span>
  <button class="btn-ghost" onclick="playAnimation()" id="playBtn">▶ Play</button>
  <button class="btn-accent" onclick="exportSheet()" id="exportBtn">📦 Export</button>
</div>

<!-- Main -->
<div class="main">
  <!-- Canvas -->
  <div class="canvas-area" id="canvasContainer">
    <canvas id="mainCanvas"></canvas>

    <!-- Tools -->
    <div class="tools">
      <button id="toolEraser" class="active" onclick="setTool('eraser')" title="Manual eraser (E)">🧹</button>
      <button id="toolGreenScrub" onclick="setTool('greenscrub')" title="Smart green scrub — only removes green screen (G)">🟢</button>
      <div style="border-top:1px solid var(--border);margin:4px 0"></div>
      <button onclick="aiCleanFrame()" title="Re-run AI matting on this frame">🤖</button>
      <select id="aiModel" style="width:38px;height:36px;border:none;border-radius:8px;background:transparent;color:var(--text2);font-size:11px;cursor:pointer;margin-top:2px" title="Select AI model for single-frame reprocessing">
        <option value="u2net">U2</option>
      </select>
      <button id="toolUndo" onclick="undo()" title="Undo (Ctrl+Z)">↩</button>
      <span class="size-label">Size</span>
      <input type="range" id="brushSize" min="4" max="80" value="20" orient="vertical"
             oninput="brushSize = parseInt(this.value); document.getElementById('sizeVal').textContent=brushSize">
      <span class="size-label" id="sizeVal">20</span>
      <div style="border-top:1px solid var(--border);margin:4px 0"></div>
      <button onclick="zoomIn()" title="Zoom in (Ctrl+=)">➕</button>
      <span class="size-label" id="zoomLabel" style="cursor:pointer" onclick="zoomReset()" title="Reset zoom (Ctrl+0)">100%</span>
      <button onclick="zoomOut()" title="Zoom out (Ctrl+-)">➖</button>
      <button onclick="zoomFit()" title="Fit to screen">⊡</button>
    </div>
  </div>

  <!-- Filmstrip -->
  <div class="filmstrip" id="filmstrip"></div>
</div>

<!-- Bottom bar -->
<div class="bottombar">
  <span class="frame-info" id="frameInfo">Frame 1 / {{ frame_count }}</span>
  <span class="spacer"></span>
  <span style="color:var(--text2);">← → nav  |  E erase  |  G scrub  |  Ctrl+Z undo  |  Ctrl+/− zoom  |  scroll zoom</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Export modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h2>✅ Export Ready</h2>
    <p>Your sprite sheet has been generated.</p>
    <div class="result" id="exportResult"></div>
    <br>
    <button class="btn-accent" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────
const sessionId = "{{ session_id }}";
const frameCount = {{ frame_count }};
const frameWidth = {{ frame_width }};
const frameHeight = {{ frame_height }};

let currentFrame = 0;
let brushSize = 20;
let currentTool = 'eraser';  // 'eraser' | 'greenscrub'
let isDrawing = false;
let framesModified = new Set();

// Undo stacks per frame (array of ImageData snapshots)
const undoStacks = Array.from({length: frameCount}, () => []);
const MAX_UNDO = 30;

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
let frameImages = [];     // Image elements loaded from server
let displayImage = null;  // Current displayed Image
let zoom = 1.0;           // zoom level (0.25 – 4.0)
let fitScale = 1.0;       // base fit-to-container scale (set in showFrame)
const ZOOM_MIN = 0.25;
const ZOOM_MAX = 4.0;
const ZOOM_STEP = 0.15;

// ── Init ───────────────────────────────────────────────────────────
async function init() {
  // Load all frame URLs
  const frameUrls = [
    {% for f in frames %}"{{ f.url }}"{% if not forloop.last %},{% endif %}{% endfor %}
  ];

  // Preload all frames
  frameImages = await Promise.all(frameUrls.map(url => {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }));

  // Load available models for the reprocess dropdown
  loadEditorModels();

  buildFilmstrip();
  showFrame(0);
}

async function loadEditorModels() {
  try {
    const resp = await fetch('/api/models/');
    const data = await resp.json();
    const select = document.getElementById('aiModel');
    select.innerHTML = '';

    const shortNames = {
      'u2net': 'U2', 'u2net_human_seg': 'UH', 'isnet-general-use': 'IS',
      'isnet-anime': 'IA', 'birefnet-general': 'BR', 'birefnet-portrait': 'BP',
      'birefnet-dis': 'BD', 'ben2': 'B2'
    };

    const entries = Object.entries(data.models).sort((a, b) => {
      if (a[1].cached && !b[1].cached) return -1;
      if (!a[1].cached && b[1].cached) return 1;
      return 0;
    });

    entries.forEach(([key, info]) => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = (shortNames[key] || key) + (info.cached ? '' : ' ⬇');
      opt.title = `${key} — ${info.description}${info.cached ? ' (cached)' : ' (needs download)'}`;
      select.appendChild(opt);
    });

    // Default to session config model or u2net
    select.value = 'u2net';
  } catch (e) {
    // keep the default u2net option
  }
}

init();

// ── Filmstrip ──────────────────────────────────────────────────────
function buildFilmstrip() {
  const strip = document.getElementById('filmstrip');
  strip.innerHTML = '';
  frameImages.forEach((img, i) => {
    if (!img) return;
    const thumb = document.createElement('img');
    thumb.src = img.src;
    thumb.className = 'thumb';
    if (i === currentFrame) thumb.classList.add('active');
    thumb.title = `Frame ${i + 1}`;
    thumb.onclick = () => showFrame(i);
    strip.appendChild(thumb);
  });
}

function updateFilmstripHighlight() {
  const thumbs = document.getElementById('filmstrip').children;
  for (let i = 0; i < thumbs.length; i++) {
    thumbs[i].classList.toggle('active', i === currentFrame);
    thumbs[i].classList.toggle('edited', framesModified.has(i));
  }
}

// ── Frame display ──────────────────────────────────────────────────
function showFrame(idx) {
  if (idx < 0 || idx >= frameCount) return;
  // Save current frame if modified
  if (framesModified.has(currentFrame)) {
    saveCurrentFrameToUndoStack();
  }

  currentFrame = idx;
  const img = frameImages[idx];
  if (!img) return;

  // Size canvas: base fit + zoom multiplier
  const container = document.getElementById('canvasContainer');
  const maxW = container.clientWidth - 60;
  const maxH = container.clientHeight - 20;
  fitScale = Math.min(maxW / img.width, maxH / img.height, 1);
  const scale = fitScale * zoom;
  canvas.width = Math.floor(img.width * scale);
  canvas.height = Math.floor(img.height * scale);

  displayImage = img;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  updateFilmstripHighlight();
  document.getElementById('frameInfo').textContent =
    `Frame ${idx + 1} / ${frameCount}`;

  // Push initial state to undo stack if empty
  if (undoStacks[idx].length === 0) {
    undoStacks[idx].push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  }
}

function saveCurrentFrameToUndoStack() {
  const stack = undoStacks[currentFrame];
  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  stack.push(data);
  if (stack.length > MAX_UNDO) stack.shift();
}

// ── Drawing / Erasing ──────────────────────────────────────────────
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

canvas.addEventListener('mousedown', (e) => {
  if (currentTool !== 'eraser' && currentTool !== 'greenscrub') return;
  isDrawing = true;
  saveCurrentFrameToUndoStack();
  const pos = getCanvasPos(e);
  if (currentTool === 'greenscrub') {
    greenScrubSampleAt(pos.x, pos.y);  // sample reference colour
    greenScrubAt(pos.x, pos.y);
  } else eraseAt(pos.x, pos.y);
});

canvas.addEventListener('mousemove', (e) => {
  if (!isDrawing || (currentTool !== 'eraser' && currentTool !== 'greenscrub')) return;
  const pos = getCanvasPos(e);
  if (currentTool === 'greenscrub') greenScrubAt(pos.x, pos.y);
  else eraseAt(pos.x, pos.y);
});

canvas.addEventListener('mouseup', () => {
  if (isDrawing) {
    isDrawing = false;
    scrubSample = null;
    framesModified.add(currentFrame);
    updateFilmstripHighlight();
  }
});

canvas.addEventListener('mouseleave', () => {
  if (isDrawing) {
    isDrawing = false;
    scrubSample = null;
    framesModified.add(currentFrame);
    updateFilmstripHighlight();
  }
});

// Touch support
canvas.addEventListener('touchstart', (e) => {
  if (currentTool !== 'eraser' && currentTool !== 'greenscrub') return;
  e.preventDefault();
  isDrawing = true;
  saveCurrentFrameToUndoStack();
  const pos = getCanvasPos(e.touches[0]);
  if (currentTool === 'greenscrub') {
    greenScrubSampleAt(pos.x, pos.y);
    greenScrubAt(pos.x, pos.y);
  } else eraseAt(pos.x, pos.y);
}, {passive: false});

canvas.addEventListener('touchmove', (e) => {
  if (!isDrawing || (currentTool !== 'eraser' && currentTool !== 'greenscrub')) return;
  e.preventDefault();
  const pos = getCanvasPos(e.touches[0]);
  if (currentTool === 'greenscrub') greenScrubAt(pos.x, pos.y);
  else eraseAt(pos.x, pos.y);
}, {passive: false});

canvas.addEventListener('touchend', () => {
  if (isDrawing) {
    isDrawing = false;
    scrubSample = null;
    framesModified.add(currentFrame);
    updateFilmstripHighlight();
  }
});

function eraseAt(x, y) {
  const r = brushSize / 2;
  ctx.save();
  ctx.globalCompositeOperation = 'destination-out';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ── AI Clean Frame (server-side rembg) ─────────────────────────────
async function aiCleanFrame() {
  const name = `frame_${String(currentFrame + 1).padStart(4, '0')}.png`;
  const model = document.getElementById('aiModel').value;
  toast(`Running AI cleanup (${model}) on this frame…`);

  try {
    const resp = await fetch(`/api/reprocess-frame/${sessionId}/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, model }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'AI clean failed');

    // Reload the frame image with cache bust
    const newImg = new Image();
    newImg.onload = () => {
      frameImages[currentFrame] = newImg;
      undoStacks[currentFrame] = [];
      showFrame(currentFrame);
      framesModified.add(currentFrame);
      updateFilmstripHighlight();
      const thumbs = document.getElementById('filmstrip').children;
      if (thumbs[currentFrame]) thumbs[currentFrame].src = newImg.src;
      toast('AI clean done ✓');
    };
    newImg.src = data.url + '?t=' + Date.now();
  } catch (err) {
    toast('Error: ' + err.message);
  }
}

// ── Smart green-screen scrub (adaptive sampling) ──────────────────
// On mousedown we sample the pixel under the cursor.  Then every pixel
// within the brush that is within a colour-distance tolerance of that
// sampled colour gets erased.  This adapts to whatever shade of green
// screen is present, instead of relying on fixed thresholds.
//
// Still protected: pixels where G is NOT the dominant channel are
// almost certainly mascot, so they are never touched regardless of
// proximity to the sampled colour.

let scrubSample = null;  // {r, g, b} sampled on stroke start

const SCRUB_TOLERANCE = 55;  // max Euclidean distance in RGB space

function greenScrubSampleAt(cx, cy) {
  // Sample the pixel at cursor — only if it's green-dominant
  if (cx < 0 || cy < 0 || cx >= canvas.width || cy >= canvas.height) return;
  const px = ctx.getImageData(Math.floor(cx), Math.floor(cy), 1, 1).data;
  const rv = px[0], gv = px[1], bv = px[2], av = px[3];
  if (av < 20 || gv <= rv || gv <= bv) {
    scrubSample = null;  // not a green pixel — don't scrub
  } else {
    scrubSample = { r: rv, g: gv, b: bv };
  }
}

function greenScrubAt(cx, cy) {
  if (!scrubSample) return;  // no valid sample to match against

  const r = Math.ceil(brushSize / 2);
  const x0 = Math.max(0, Math.floor(cx - r));
  const y0 = Math.max(0, Math.floor(cy - r));
  const x1 = Math.min(canvas.width,  Math.ceil(cx + r));
  const y1 = Math.min(canvas.height, Math.ceil(cy + r));
  const w = x1 - x0;
  const h = y1 - y0;
  if (w <= 0 || h <= 0) return;

  const imageData = ctx.getImageData(x0, y0, w, h);
  const data = imageData.data;
  const sr = scrubSample.r, sg = scrubSample.g, sb = scrubSample.b;

  for (let i = 0; i < data.length; i += 4) {
    const px = x0 + ((i / 4) % w);
    const py = y0 + Math.floor((i / 4) / w);
    const dx = px - cx, dy = py - cy;
    if (dx * dx + dy * dy > r * r) continue;

    const rv = data[i], gv = data[i + 1], bv = data[i + 2], av = data[i + 3];
    if (av < 10) continue;  // already transparent

    // Safety: never erase pixels where green is NOT the dominant channel.
    // This protects the mascot's dark colours (where R or B dominate).
    if (gv <= rv || gv <= bv) continue;

    // Colour distance to the sampled green-screen pixel
    const dr = rv - sr, dg = gv - sg, db = bv - sb;
    const dist = Math.sqrt(dr * dr + dg * dg + db * db);
    if (dist <= SCRUB_TOLERANCE) {
      data[i + 3] = 0;  // erase
    }
  }

  ctx.putImageData(imageData, x0, y0);
}

// ── Tool selection ─────────────────────────────────────────────────
function setTool(tool) {
  currentTool = tool;
  document.getElementById('toolEraser').classList.toggle('active', tool === 'eraser');
  document.getElementById('toolGreenScrub').classList.toggle('active', tool === 'greenscrub');
  if (tool === 'eraser') canvas.style.cursor = 'crosshair';
  else if (tool === 'greenscrub') canvas.style.cursor = 'cell';
  else canvas.style.cursor = 'default';
}

// ── Undo ───────────────────────────────────────────────────────────
function undo() {
  const stack = undoStacks[currentFrame];
  if (stack.length <= 1) return; // keep at least one state
  stack.pop(); // discard current
  const prev = stack[stack.length - 1];
  canvas.width = prev.width;
  canvas.height = prev.height;
  ctx.putImageData(prev, 0, 0);

  // Check if frame is now identical to original
  if (stack.length === 1) {
    framesModified.delete(currentFrame);
  } else {
    framesModified.add(currentFrame);
  }
  updateFilmstripHighlight();
}

// ── Navigation ─────────────────────────────────────────────────────
function nextFrame() { showFrame(currentFrame + 1); }
function prevFrame() { showFrame(currentFrame - 1); }

// ── Playback ───────────────────────────────────────────────────────
let playTimer = null;
function playAnimation() {
  const btn = document.getElementById('playBtn');
  if (playTimer) {
    clearInterval(playTimer);
    playTimer = null;
    btn.textContent = '▶ Play';
    return;
  }
  btn.textContent = '⏸ Stop';
  const fps = {{ fps }};
  const interval = 1000 / fps;
  let frame = currentFrame;
  playTimer = setInterval(() => {
    frame = (frame + 1) % frameCount;
    showFrame(frame);
  }, interval);
}

// ── Save ───────────────────────────────────────────────────────────
async function saveFrame(idx) {
  const img = frameImages[idx];
  if (!img) return;

  // Draw the current canvas back to a temp canvas at original resolution
  const tmp = document.createElement('canvas');
  tmp.width = img.width;
  tmp.height = img.height;
  const tctx = tmp.getContext('2d');
  tctx.drawImage(canvas, 0, 0, img.width, img.height);
  const dataUrl = tmp.toDataURL('image/png');

  // Build the frame name
  const name = `frame_${String(idx + 1).padStart(4, '0')}.png`;

  await fetch(`/api/save-frame/${sessionId}/`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name, image: dataUrl}),
  });

  // Update the cached image so subsequent redraws reflect the edit
  return new Promise((resolve) => {
    const newImg = new Image();
    newImg.onload = () => {
      frameImages[idx] = newImg;
      resolve();
    };
    newImg.src = dataUrl;
  });
}

async function saveAllFrames() {
  toast('Saving all frames…');
  for (const idx of framesModified) {
    await saveFrame(idx);
  }
  framesModified.clear();
  updateFilmstripHighlight();
  toast('All frames saved ✓');
}

// ── Export ─────────────────────────────────────────────────────────
async function exportSheet() {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.textContent = 'Exporting…';

  // Save unsaved frames first
  if (framesModified.size > 0) {
    await saveAllFrames();
  }

  const resp = await fetch(`/api/export/${sessionId}/`, {method: 'POST'});
  const data = await resp.json();

  document.getElementById('exportResult').innerHTML = `
    <p>Sprite sheet: <a href="${data.sprite_url}" download>${data.sprite_url}</a></p>
    <p>Metadata: <a href="${data.meta_url}" download>${data.meta_url}</a></p>
    <p>${data.total_frames} frames · ${data.frame_width}×${data.frame_height} px</p>
  `;
  document.getElementById('exportModal').classList.add('active');
  btn.disabled = false;
  btn.textContent = '📦 Export';
}

function closeModal() {
  document.getElementById('exportModal').classList.remove('active');
}

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ── Zoom ───────────────────────────────────────────────────────────
function applyZoom(newZoom) {
  zoom = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, newZoom));
  zoom = Math.round(zoom * 100) / 100;
  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
  const img = frameImages[currentFrame];
  if (!img) return;
  const scale = fitScale * zoom;
  undoStacks[currentFrame] = [];
  canvas.width = Math.floor(img.width * scale);
  canvas.height = Math.floor(img.height * scale);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  undoStacks[currentFrame].push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}

function zoomIn()  { applyZoom(zoom + ZOOM_STEP); }
function zoomOut() { applyZoom(zoom - ZOOM_STEP); }
function zoomReset() { applyZoom(1.0); }
function zoomFit() {
  const container = document.getElementById('canvasContainer');
  const img = frameImages[currentFrame];
  if (!img) return;
  const maxW = container.clientWidth - 60;
  const maxH = container.clientHeight - 20;
  const fit = Math.min(maxW / img.width, maxH / img.height, 1);
  applyZoom(fit / fitScale);
}

// Mouse wheel zoom on canvas
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -ZOOM_STEP : ZOOM_STEP;
  applyZoom(zoom + delta);
}, { passive: false });

// ── Keyboard shortcuts ─────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  const ctrl = e.ctrlKey || e.metaKey;
  switch (e.key) {
    case 'ArrowLeft': prevFrame(); break;
    case 'ArrowRight': nextFrame(); break;
    case 'e': case 'E': if (!ctrl) setTool('eraser'); break;
    case 'g': case 'G': if (!ctrl) setTool('greenscrub'); break;
    case 'z': case 'Z': if (ctrl) { e.preventDefault(); undo(); } break;
    case 's': case 'S': if (ctrl) { e.preventDefault(); saveAllFrames(); } break;
    case '=': case '+': if (ctrl) { e.preventDefault(); zoomIn(); } break;
    case '-': case '_': if (ctrl) { e.preventDefault(); zoomOut(); } break;
    case '0': if (ctrl) { e.preventDefault(); zoomReset(); } break;
  }
});
</script>
</body>
