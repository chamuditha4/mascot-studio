name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # The tests never invoke a matting model, so the heavy rembg /
      # onnxruntime wheels are not installed here.
      - name: Install test dependencies
        run: pip install "Django>=5.0" "Pillow>=10.0" "numpy>=1.24"

      - name: Django system check
        run: python manage.py check

      - name: Run tests
        run: python manage.py test
